<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            const dir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('dir', dir);
            if (theme === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Global Link Client Portal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1A237E',
                        secondary: '#3B82F6',
                        surface: {
                            light: '#FFFFFF',
                            dark: '#111827'
                        },
                        background: {
                            light: '#F8F9FA',
                            dark: '#0A0A0A'
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-background-dark min-h-screen flex items-center justify-center p-4 overflow-x-hidden">

    <!-- Theme & RTL Toggles (Floating for auth etc.) -->
    <div class="absolute top-4 right-4 md:top-8 md:right-8 flex gap-2 md:gap-4 z-50">
        <button onclick="toggleDirection()" class="p-2 md:p-3 bg-white dark:bg-slate-800 rounded-full shadow-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition-all"><i class="fas fa-right-left text-sm md:text-base"></i></button>
        <button onclick="toggleTheme()" class="p-2 md:p-3 bg-white dark:bg-slate-800 rounded-full shadow-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition-all"><i class="fas fa-moon dark:hidden text-sm md:text-base"></i><i class="fas fa-sun hidden dark:inline text-sm md:text-base"></i></button>
    </div>

    <!-- Login Container -->
    <main class="w-full max-w-xl bg-white dark:bg-surface-dark rounded-3xl overflow-hidden shadow-2xl p-8 lg:p-12 relative">
        <div class="mb-10 text-center">
            <a href="index.html" class="inline-flex items-center gap-3 mb-8">
                <img src="logo.png" alt="Logo" class="w-10 h-10">
                <span class="text-xl font-bold logo-text whitespace-nowrap">GLOBAL LINK</span>
            </a>
            <h2 class="text-3xl font-bold mb-2 text-slate-800 dark:text-white">Secure Login</h2>
            <p class="text-slate-500">Enter your credentials to access the portal</p>

        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-800 dark:text-white mb-2">Email Address</label>
                <div class="relative">
                    <input type="email" required placeholder="name@example.com" class="w-full pl-12 pr-4 py-3 bg-slate-50 dark:bg-black/20 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-secondary outline-none transition-all">
                    <i class="fas fa-envelope absolute left-4 top-4 text-slate-400"></i>
                </div>
            </div>
            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-sm font-bold text-slate-800 dark:text-white uppercase tracking-wider">Password</label>
                </div>
                <div class="relative mb-2">
                    <input type="password" id="password" required placeholder="••••••••" class="w-full pl-12 pr-12 py-3 bg-slate-50 dark:bg-black/20 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-secondary outline-none transition-all">
                    <i class="fas fa-lock absolute left-4 top-4 text-slate-400"></i>
                    <button type="button" onclick="togglePasswordVisibility('password', 'eye-icon')" class="password-toggle">
                        <i id="eye-icon" class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="text-right">
                    <a href="#" class="text-xs text-secondary font-bold hover:underline">Forgot password?</a>
                </div>
            </div>
            
            <div class="space-y-3">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember" class="w-4 h-4 accent-secondary bg-slate-100 rounded">
                    <label for="remember" class="text-sm text-slate-500">Keep me logged in for 30 days</label>
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-primary text-white font-bold rounded-xl transition-all duration-300 shadow-lg shadow-primary/20 hover:bg-secondary hover:shadow-secondary/40 hover:-translate-y-1 active:scale-95 uppercase tracking-widest border border-white/10 group">
                <span class="group-hover:tracking-[0.2em] transition-all duration-300">SIGN IN TO PORTAL</span>
            </button>
        </form>

        <!-- Social Integration Section -->
        <div class="mt-8">
            <div class="relative flex items-center justify-center mb-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100 dark:border-slate-800"></div></div>
                <span class="relative px-4 bg-white dark:bg-surface-dark text-xs font-bold text-slate-400 uppercase tracking-widest">Or Continue With</span>
            </div>
            
            <div class="grid grid-cols-3 gap-4 mb-8">
                <button class="social-auth-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" alt="Google">
                    Google
                </button>
                <button class="social-auth-btn">
                    <i class="fab fa-apple text-lg"></i>
                    Apple
                </button>
                <button class="social-auth-btn">
                    <i class="fab fa-linkedin text-[#0A66C2] text-lg"></i>
                    LinkedIn
                </button>
            </div>
        </div>

        <div class="mt-8 pt-8 border-t border-slate-50 dark:border-slate-800/50 text-center text-sm text-slate-500">
            Don't have an account? <a href="signup.html" class="text-secondary font-bold hover:underline">Sign Up</a>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        };
    </script>
</body>
</html>
