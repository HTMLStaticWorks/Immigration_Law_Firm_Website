<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            const dir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('dir', dir);
            if (theme === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Global Link | Secure Enrollment</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1A237E',
                        secondary: '#3B82F6',
                        surface: {
                            light: '#FFFFFF',
                            dark: '#111827'
                        },
                        background: {
                            light: '#F8F9FA',
                            dark: '#0A0A0A'
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-background-dark min-h-screen flex items-center justify-center p-4">

    <!-- Floating Toggles -->
    <div class="absolute top-4 right-4 md:top-8 md:right-8 flex gap-2 md:gap-4 z-50">
        <button onclick="toggleDirection()" class="p-2 md:p-3 bg-white dark:bg-slate-800 rounded-full shadow-xl hover:bg-slate-100 transition-all"><i class="fas fa-right-left text-sm md:text-base"></i></button>
        <button onclick="toggleTheme()" class="p-2 md:p-3 bg-white dark:bg-slate-800 rounded-full shadow-xl hover:bg-slate-100 transition-all"><i class="fas fa-moon dark:hidden text-sm md:text-base"></i><i class="fas fa-sun hidden dark:inline text-sm md:text-base"></i></button>
    </div>

    <!-- Signup Container -->
    <main class="w-full max-w-xl bg-white dark:bg-surface-dark rounded-3xl overflow-hidden shadow-2xl p-8 lg:p-12 relative">
        <div class="mb-10 text-center">
            <a href="index.html" class="inline-flex items-center gap-3 mb-8">
                <img src="logo.png" alt="Logo" class="w-10 h-10">
                <span class="text-xl font-bold logo-text whitespace-nowrap">GLOBAL LINK</span>
            </a>
            <h2 class="text-3xl font-bold mb-2 text-slate-800 dark:text-white">Create Account</h2>
            <p class="text-slate-500">Secure your path today</p>
        </div>

        <form id="signup-form" class="space-y-5">
            <div class="relative">
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">First Name</label>
                <div class="relative">
                    <input type="text" required class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-black/20 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-secondary outline-none transition-all placeholder:text-slate-400" placeholder="John">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                </div>
            </div>
            <div class="relative">
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Last Name</label>
                <div class="relative">
                    <input type="text" required class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-black/20 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-secondary outline-none transition-all placeholder:text-slate-400" placeholder="Doe">
                    <i class="fas fa-user-tag absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                </div>
            </div>
            <div>
               <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Email Address</label>
               <div class="relative">
                   <input type="email" required placeholder="name@example.com" class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-black/20 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-secondary outline-none transition-all placeholder:text-slate-400">
                   <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
               </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Secure Password</label>
                <div class="relative mb-4">
                    <input type="password" id="password" required placeholder="••••••••" class="w-full pl-11 pr-12 py-3 bg-slate-50 dark:bg-black/20 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-secondary outline-none transition-all placeholder:text-slate-400">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <button type="button" onclick="togglePasswordVisibility('password', 'eye-icon-1')" class="password-toggle">
                        <i id="eye-icon-1" class="fas fa-eye"></i>
                    </button>
                </div>
                
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Confirm Password</label>
                <div class="relative mb-2">
                    <input type="password" id="confirm-password" required placeholder="••••••••" class="w-full pl-11 pr-12 py-3 bg-slate-50 dark:bg-black/20 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-secondary outline-none transition-all placeholder:text-slate-400">
                    <i class="fas fa-shield-check absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <button type="button" onclick="togglePasswordVisibility('confirm-password', 'eye-icon-2')" class="password-toggle">
                        <i id="eye-icon-2" class="fas fa-eye"></i>
                    </button>
                </div>

            </div>
            
            <div class="text-[10px] text-slate-500 leading-tight">
                By clicking "Create Account", you agree to our <a href="#" class="text-secondary hover:underline">Terms of Service</a> and <a href="#" class="text-secondary hover:underline">Privacy Policy</a>.
            </div>

            <button type="submit" class="w-full py-4 bg-primary text-white font-bold rounded-xl transition-all duration-300 shadow-lg shadow-primary/20 hover:bg-secondary hover:shadow-secondary/40 hover:-translate-y-1 active:scale-95 uppercase tracking-widest border border-white/10 group">
                <span class="group-hover:tracking-[0.2em] transition-all duration-300">SIGN UP</span>
            </button>
        </form>

        <!-- Social Integration Section -->
        <div class="mt-8">
            <div class="relative flex items-center justify-center mb-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100 dark:border-slate-800"></div></div>
                <span class="relative px-4 bg-white dark:bg-surface-dark text-xs font-bold text-slate-400 uppercase tracking-widest">Or Continue With</span>
            </div>
            
            <div class="grid grid-cols-3 gap-4 mb-8">
                <button class="social-auth-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" alt="Google">
                    Google
                </button>
                <button class="social-auth-btn">
                    <i class="fab fa-apple text-lg"></i>
                    Apple
                </button>
                <button class="social-auth-btn">
                    <i class="fab fa-linkedin text-[#0A66C2] text-lg"></i>
                    LinkedIn
                </button>
            </div>
        </div>

        <div class="mt-8 pt-8 border-t border-slate-50 dark:border-slate-800/50 text-center text-sm text-slate-500 font-medium">
            Already registered? <a href="login.html" class="text-secondary font-bold hover:underline">Sign In Instead</a>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        document.getElementById('signup-form').onsubmit = (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match. Please try again.');
                return;
            }

            alert('Sign up successful! Please check your email for verification.');
            window.location.href = 'login.html';
        };
    </script>
</body>
</html>
